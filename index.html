<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Grocery POS • Billing Web App</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkdyb2NlcnkgUE9TIiwKICAic2hvcnRfbmFtZSI6ICJQb3MiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMwZjE3MmEiCn0=">
  
  <!-- Libraries -->
  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --primary: #0f172a;
      --primary-foreground: #ffffff;
      --accent: #16a34a;
      --accent-light: #dcfce7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
      --radius: 16px;
    }
    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --primary: #f1f5f9;
      --primary-foreground: #0f172a;
      --accent-light: #064e3b;
      --danger-light: #7f1d1d;
      --warning-light: #78350f;
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.6);
    }
    body {
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
      margin: 0;
    }
    .app-container {
      max-width: 520px;
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .header h2 {
      font-weight: 700;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #16a34a, #0f172a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dark .header h2 {
      background: linear-gradient(135deg, #4ade80, #f1f5f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .icon-btn {
      background: var(--bg);
      border: 2px solid var(--border);
      padding: 10px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      transition: all 0.2s;
    }
    .icon-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .icon-btn:active {
      transform: scale(0.95);
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      min-height: 48px;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-accent {
      background: var(--accent);
      color: white;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-small {
      padding: 8px 12px;
      min-height: 36px;
      font-size: 0.85rem;
    }
    .cart-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 2px solid var(--border);
      gap: 8px;
      transition: all 0.2s;
    }
    .cart-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      padding: 4px;
      border-radius: 10px;
    }
    .qty-control button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-weight: bold;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      color: var(--text);
    }
    .qty-control button:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    input, select, textarea {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      width: 100%;
      margin-top: 4px;
      font-size: 16px;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
    }
    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .summary {
      background: var(--bg);
      border-radius: 14px;
      padding: 16px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 2px solid var(--border);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-row {
      font-weight: 700;
      font-size: 1.4rem;
      border-top: 2px solid var(--accent);
      padding-top: 12px;
      margin-top: 4px;
      color: var(--accent);
    }
    .hidden {
      display: none !important;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
    }
    .scanner-view {
      width: 100%;
      height: 250px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      border: 2px solid var(--accent);
    }
    .scanner-view video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
      z-index: 999;
      max-height: 75vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .badge {
      background: var(--accent-light);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      animation: slideDown 0.3s ease;
      min-width: 250px;
      text-align: center;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
    }
    .toast-success {
      background: var(--accent-light);
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .toast-error {
      background: var(--danger-light);
      color: var(--danger);
      border: 2px solid var(--danger);
    }
    .product-card {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .product-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .product-image {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid var(--border);
    }
    .qr-container {
      text-align: center;
      padding: 10px;
      background: white;
      border-radius: 12px;
      display: inline-block;
    }
    .qr-amount {
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: 8px;
      color: #000;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      padding-left: 40px;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translate(-50%, -100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .pulse {
      animation: pulse 2s infinite;
    }
    @media print {
      body { background: white; }
      .app-container, .modal, .drawer, .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
    .category-tag {
      background: var(--warning-light);
      color: var(--warning);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body class="light">
<div class="app-container" id="appContainer">
  <!-- Header -->
  <div class="header">
    <div>
      <h2>🛒 Grocery POS</h2>
      <small style="color: var(--text-secondary);" id="shopNameDisplay">FreshMart Grocery</small>
    </div>
    <div style="display: flex; gap: 6px;">
      <button class="icon-btn" id="darkToggle" title="Toggle dark mode">🌓</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- Quick Stats -->
  <div class="grid-2" id="dashboardStats">
    <div style="background: var(--bg); padding: 12px; border-radius: 14px; border: 2px solid var(--border);">
      <small style="color: var(--text-secondary);">💰 Today's Sales</small><br>
      <strong id="todaySales" style="font-size: 1.3rem;">₹0.00</strong>
    </div>
    <div style="background: var(--bg); padding: 12px; border-radius: 14px; border: 2px solid var(--border);">
      <small style="color: var(--text-secondary);">📊 Total Bills</small><br>
      <strong id="totalBills" style="font-size: 1.3rem;">0</strong>
    </div>
  </div>

  <!-- Cart Display -->
  <div style="max-height: 300px; overflow-y: auto; padding-right: 4px; min-height: 80px;" id="cartItems"></div>
  
  <!-- Cart Summary -->
  <div class="summary">
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotal">₹0.00</span>
    </div>
    <div class="summary-row">
      <span>Tax Amount</span>
      <span id="taxAmount">₹0.00</span>
    </div>
    <div class="summary-row total-row">
      <span>💳 Total Amount</span>
      <span id="finalTotal">₹0.00</span>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="grid-2">
    <button class="btn btn-accent" id="scanBarcodeBtn">
      <span>📷</span> Scan Barcode
    </button>
    <button class="btn btn-outline" id="manualAddBtn">
      <span>➕</span> Quick Add
    </button>
    <button class="btn btn-outline" id="customerBtn">
      <span>👤</span> Customer
    </button>
    <button class="btn" id="printBillBtn">
      <span>🖨️</span> Print Bill
    </button>
  </div>
  
  <!-- Download Options -->
  <div class="grid-3">
    <button class="btn btn-outline btn-small" id="downloadPdfBtn">
      <span>📄</span> PDF
    </button>
    <button class="btn btn-outline btn-small" id="downloadJpgBtn">
      <span>🖼️</span> JPG
    </button>
    <button class="btn btn-outline btn-small" id="shareBillBtn">
      <span>📤</span> Share
    </button>
  </div>
  
  <!-- Quick Actions -->
  <div style="display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="btn btn-outline btn-small" id="historyBtn" style="flex:1;">📋 History</button>
    <button class="btn btn-outline btn-small" id="productsBtn" style="flex:1;">📦 Products</button>
    <button class="btn btn-outline btn-small" id="addProductBtn" style="flex:1;">➕ Add Product</button>
    <button class="btn btn-outline btn-small" id="backupBtn" style="flex:1;">💾 Backup</button>
  </div>
</div>

<!-- Modals and Drawers Container -->
<div id="modalContainer"></div>
<div id="drawerContainer"></div>

<!-- Hidden print area -->
<div id="printArea" class="print-only"></div>

<script>
  (function() {
    // ============ STORAGE & STATE MANAGEMENT ============
    const LS = {
      get(key, def) { 
        try { 
          const data = localStorage.getItem(key);
          return data ? JSON.parse(data) : def; 
        } catch(e) { return def; }
      },
      set(key, val) { 
        try { 
          localStorage.setItem(key, JSON.stringify(val)); 
        } catch(e) { 
          showToast('Storage full! Please clear some data.', 'error');
        }
      }
    };
    
    // Default product database
    const defaultProducts = [
      { id: 1, barcode: '8901234567890', name: 'Basmati Rice 1kg', category: 'Grains', price: 180, tax: 5, unit: 'kg', image: '', stock: 50 },
      { id: 2, barcode: '8909876543210', name: 'Sugar 1kg', category: 'Groceries', price: 45, tax: 5, unit: 'kg', image: '', stock: 100 },
      { id: 3, barcode: '8901111222333', name: 'Milk 500ml', category: 'Dairy', price: 28, tax: 0, unit: 'packet', image: '', stock: 30 },
      { id: 4, barcode: '8902222333444', name: 'Bread', category: 'Bakery', price: 35, tax: 0, unit: 'piece', image: '', stock: 20 },
      { id: 5, barcode: '8903333444555', name: 'Eggs (6 pcs)', category: 'Dairy', price: 60, tax: 0, unit: 'packet', image: '', stock: 40 },
      { id: 6, barcode: '8904444555666', name: 'Wheat Flour 1kg', category: 'Grains', price: 55, tax: 5, unit: 'kg', image: '', stock: 60 },
      { id: 7, barcode: '8905555666777', name: 'Cooking Oil 1L', category: 'Groceries', price: 150, tax: 5, unit: 'litre', image: '', stock: 25 },
      { id: 8, barcode: '8906666777888', name: 'Tea 250g', category: 'Beverages', price: 120, tax: 5, unit: 'packet', image: '', stock: 35 }
    ];
    
    let products = LS.get('grocery_products', defaultProducts);
    let nextProductId = Math.max(...products.map(p => p.id || 0), 0) + 1;
    
    const defaultSettings = {
      shopName: 'FreshMart Grocery',
      owner: 'Ramesh Patel',
      mobile: '9876543210',
      address: '12, Main Road, Mumbai - 400001',
      gst: '27ABCDE1234F1Z5',
      upi: 'shopowner@upi',
      logo: '',
      footer: 'Thank you for shopping! 😊',
      currency: '₹',
      defaultFormat: 'thermal'
    };
    
    let settings = LS.get('shop_settings', defaultSettings);
    let cart = [];
    let salesHistory = LS.get('sales_history', []);
    let billCounter = LS.get('bill_counter', 1000);
    let currentCustomer = { name: '', mobile: '' };
    let scannerActive = false;

    // Update shop name display
    document.getElementById('shopNameDisplay').textContent = settings.shopName;

    // ============ PERSISTENCE FUNCTIONS ============
    function saveProducts() { 
      LS.set('grocery_products', products); 
      nextProductId = Math.max(...products.map(p => p.id || 0), 0) + 1;
    }
    function saveHistory() { 
      LS.set('sales_history', salesHistory); 
      LS.set('bill_counter', billCounter); 
    }
    function saveSettings() { 
      LS.set('shop_settings', settings);
      document.getElementById('shopNameDisplay').textContent = settings.shopName;
    }

    // ============ UTILITY FUNCTIONS ============
    function formatCurrency(val) { 
      return `${settings.currency}${parseFloat(val || 0).toFixed(2)}`; 
    }
    
    function getProductByBarcode(code) { 
      return products.find(p => p.barcode === code); 
    }
    
    function getProductById(id) {
      return products.find(p => p.id === id);
    }

    function calculateCart() {
      let subtotal = 0, totalTax = 0;
      cart.forEach(item => {
        const rate = item.price || 0;
        const qty = item.quantity || 1;
        const discount = item.discount || 0;
        const lineTotal = (rate * qty) - discount;
        const taxAmt = (lineTotal * (item.tax || 0)) / 100;
        subtotal += lineTotal;
        totalTax += taxAmt;
      });
      return { 
        subtotal: Math.max(0, subtotal), 
        totalTax: Math.max(0, totalTax), 
        final: Math.max(0, subtotal + totalTax) 
      };
    }

    // ============ UPI QR CODE GENERATOR WITH AMOUNT ============
    function generateUPIString(amount = null) {
      const { final } = calculateCart();
      const payAmount = amount || final;
      
      // UPI deep link format with amount
      let upiString = `upi://pay?pa=${settings.upi}&pn=${encodeURIComponent(settings.shopName)}`;
      
      // Add amount if available
      if (payAmount > 0) {
        upiString += `&am=${payAmount.toFixed(2)}`;
      }
      
      // Add currency (INR default)
      upiString += `&cu=INR`;
      
      // Add transaction note
      upiString += `&tn=Payment for bill at ${encodeURIComponent(settings.shopName)}`;
      
      return upiString;
    }

    function generateQRCode(containerId, amount = null) {
      const container = document.getElementById(containerId);
      if (!container || typeof QRCode === 'undefined') return;
      
      // Clear previous QR
      container.innerHTML = '';
      
      const upiString = generateUPIString(amount);
      
      // Create wrapper for QR and amount display
      const wrapper = document.createElement('div');
      wrapper.className = 'qr-container';
      wrapper.style.textAlign = 'center';
      
      // Add label
      const label = document.createElement('p');
      label.style.cssText = 'font-size:12px;font-weight:bold;margin-bottom:5px;color:#000;';
      label.textContent = 'Scan to Pay';
      wrapper.appendChild(label);
      
      // Generate QR code
      new QRCode(container, {
        text: upiString,
        width: 120,
        height: 120,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
      
      // Add amount display below QR
      const amountDisplay = document.createElement('div');
      amountDisplay.className = 'qr-amount';
      const displayAmount = amount || calculateCart().final;
      amountDisplay.textContent = `Amount: ${formatCurrency(displayAmount)}`;
      amountDisplay.style.cssText = 'margin-top:8px;font-weight:bold;font-size:14px;color:#000;';
      container.appendChild(amountDisplay);
      
      // Add UPI ID
      const upiIdDisplay = document.createElement('small');
      upiIdDisplay.style.cssText = 'display:block;margin-top:4px;color:#666;font-size:10px;';
      upiIdDisplay.textContent = `UPI: ${settings.upi}`;
      container.appendChild(upiIdDisplay);
      
      console.log('QR Generated with UPI:', upiString);
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideDown 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // ============ CART MANAGEMENT ============
    function renderCart() {
      const container = document.getElementById('cartItems');
      const { subtotal, totalTax, final } = calculateCart();
      
      document.getElementById('subtotal').innerText = formatCurrency(subtotal);
      document.getElementById('taxAmount').innerText = formatCurrency(totalTax);
      document.getElementById('finalTotal').innerText = formatCurrency(final);
      
      if (!cart.length) {
        container.innerHTML = `
          <div style="text-align:center; padding: 30px; color: var(--text-secondary);">
            <div style="font-size: 3rem; margin-bottom: 10px;">🛒</div>
            <p style="font-weight: 600;">Cart is empty</p>
            <small>Scan barcode or add products manually</small>
          </div>`;
        return;
      }
      
      container.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div style="flex:1; min-width: 120px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              ${item.image ? `<img src="${item.image}" class="product-image" alt="${item.name}">` : ''}
              <div>
                <strong style="font-size: 0.95rem;">${item.name}</strong><br>
                <small style="color: var(--text-secondary);">
                  ${formatCurrency(item.price)} × ${item.quantity} 
                  <span class="badge">Tax: ${item.tax}%</span>
                </small>
              </div>
            </div>
          </div>
          <div class="qty-control">
            <button onclick="window.posUpdateQty(${idx}, -1)" aria-label="Decrease">−</button>
            <span style="min-width: 24px; text-align:center; font-weight: bold;">${item.quantity}</span>
            <button onclick="window.posUpdateQty(${idx}, 1)" aria-label="Increase">+</button>
          </div>
          <button class="icon-btn" onclick="window.posRemoveItem(${idx})" style="color: var(--danger);" aria-label="Remove">
            🗑️
          </button>
        </div>
      `).join('');
    }

    window.posUpdateQty = (idx, delta) => {
      if (idx >= 0 && idx < cart.length) {
        const newQty = (cart[idx].quantity || 1) + delta;
        if (newQty >= 1) {
          cart[idx].quantity = newQty;
          renderCart();
        }
      }
    };
    
    window.posRemoveItem = (idx) => {
      if (idx >= 0 && idx < cart.length) {
        const itemName = cart[idx].name;
        cart.splice(idx, 1);
        renderCart();
        showToast(`${itemName} removed from cart`, 'error');
      }
    };

    function addToCart(product, qty = 1) {
      if (!product || !product.name) {
        showToast('Invalid product', 'error');
        return;
      }
      
      const existing = cart.find(p => p.barcode === product.barcode);
      if (existing) {
        existing.quantity += qty;
      } else {
        cart.push({...product, quantity: qty, discount: 0});
      }
      
      renderCart();
      speak(`${product.name} added to cart`);
      
      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-IN';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    }

    // ============ BARCODE SCANNER ============
    async function checkCameraPermission() {
      try {
        if (!window.isSecureContext) throw new Error('Camera requires HTTPS');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        stream.getTracks().forEach(track => track.stop());
        return true;
      } catch (err) {
        return false;
      }
    }

    function startScanner() {
      checkCameraPermission().then(hasPermission => {
        if (!hasPermission) {
          showCameraError();
          return;
        }
        
        const modal = document.getElementById('modalContainer');
        modal.innerHTML = `
          <div class="modal" id="scannerModal">
            <div class="modal-content">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3>📷 Scan Barcode</h3>
                <button class="icon-btn" id="closeScanner">✕</button>
              </div>
              <div id="scannerContainer" class="scanner-view"></div>
              <div id="scannerStatus" style="text-align: center; padding: 8px;">Initializing camera...</div>
              <div style="display: flex; gap: 8px; margin-top: 12px;">
                <button class="btn btn-outline" id="stopScanner" style="flex:1;">Close</button>
                <button class="btn" id="manualEntryFallback" style="flex:1;">Enter Manually</button>
              </div>
            </div>
          </div>`;
        
        document.getElementById('scannerModal').style.display = 'flex';
        
        const closeScanner = () => {
          stopQuagga();
          document.getElementById('scannerModal').style.display = 'none';
          document.getElementById('modalContainer').innerHTML = '';
        };
        
        document.getElementById('closeScanner').onclick = closeScanner;
        document.getElementById('stopScanner').onclick = closeScanner;
        document.getElementById('manualEntryFallback').onclick = () => {
          stopQuagga();
          closeScanner();
          showManualEntry();
        };
        
        initializeQuagga();
      });
    }

    function showCameraError() {
      const modal = document.getElementById('modalContainer');
      modal.innerHTML = `
        <div class="modal" id="errorModal">
          <div class="modal-content">
            <h3>⚠️ Camera Access Required</h3>

              Camera permission denied or not available
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">

    function initializeQuagga() {
      if (typeof Quagga === 'undefined') {
        document.getElementById('scannerStatus').innerHTML = '<span style="color:red;">Library not loaded</span>';
        return;
      }
      
      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#scannerContainer'),
          constraints: { facingMode: "environment", width: { min: 640 }, height: { min: 480 } }
        },
        decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader", "code_128_reader"] }
      }, function(err) {
        if (err) {
          document.getElementById('scannerStatus').innerHTML = `<span style="color:red;">Error: ${err.message}</span>`;
          return;
        }
        Quagga.start();
        scannerActive = true;
        document.getElementById('scannerStatus').innerHTML = '<span style="color:green;">✅ Camera active</span>';
      });
      
      Quagga.onDetected(function(result) {
        if (result?.codeResult?.code) {
          const code = result.codeResult.code;
          stopQuagga();
          document.getElementById('scannerModal').style.display = 'none';
          document.getElementById('modalContainer').innerHTML = '';
          handleScannedCode(code);
        }
      });
    }

    function stopQuagga() {
      if (scannerActive) {
        try { Quagga.stop(); } catch(e) {}
        scannerActive = false;
      }
    }

    function handleScannedCode(code) {
      const product = getProductByBarcode(code);
      if (product) {
        addToCart(product);
        showToast(`${product.name} added`, 'success');
      } else {
        showToast('Product not found', 'error');
        setTimeout(() => showManualEntry(code), 1000);
      }
    }

    // ============ PRINT BILL WITH AMOUNT QR ============
    async function printBill(format = settings.defaultFormat || 'thermal') {
      if (!cart.length) {
        showToast('Cart is empty!', 'error');
        return;
      }
      
      billCounter++;
      const { final } = calculateCart();
      const billData = {
        id: billCounter,
        date: new Date().toISOString(),
        items: JSON.parse(JSON.stringify(cart)),
        subtotal: calculateCart().subtotal,
        tax: calculateCart().totalTax,
        total: final,
        customer: {...currentCustomer},
        format: format
      };
      
      salesHistory.unshift(billData);
      saveHistory();
      
      const printArea = document.getElementById('printArea');
      printArea.innerHTML = generateBillHTML(format);
      printArea.style.display = 'block';
      
      // Generate QR with the ACTUAL bill amount
      setTimeout(() => {
        generateQRCode('qrCodePrint', final);
        
        setTimeout(() => {
          window.print();
          setTimeout(() => {
            printArea.style.display = 'none';
            printArea.innerHTML = '';
            cart = [];
            currentCustomer = { name: '', mobile: '' };
            renderCart();
            updateDashboard();
          }, 500);
        }, 300);
      }, 200);
    }

    // ============ SHARE BILL WITH AMOUNT ============
    async function shareBill() {
      if (!cart.length) {
        showToast('Cart is empty!', 'error');
        return;
      }
      
      const { final } = calculateCart();
      const upiLink = generateUPIString(final);
      const text = cart.map(item => 
        `${item.name} x${item.quantity} - ${formatCurrency(item.price * item.quantity)}`
      ).join('\n');
      
      const shareText = `🛒 ${settings.shopName}\n\n${text}\n\nTotal: ${formatCurrency(final)}\n\nPay via UPI: ${upiLink}`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: `Bill from ${settings.shopName}`,
            text: shareText,
          });
        } catch (err) {
          console.log('Share cancelled');
        }
      } else {
        await navigator.clipboard.writeText(shareText);
        showToast('Bill copied with payment link!', 'success');
      }
    }

    // ============ SALES HISTORY ============
    function showHistory() {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer">
          <div class="drawer-handle"></div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3>📋 Sales History</h3>
            <button class="icon-btn" id="closeHistory">✕</button>
          </div>
          <div style="max-height: 400px; overflow-y: auto;">
            ${salesHistory.length === 0 ? 
              '<p style="text-align:center;">No sales yet</p>' :
              salesHistory.slice(0, 50).map(bill => `
                <div class="product-card">
                  <div style="display:flex;justify-content:space-between;">
                    <strong>Bill #${bill.id}</strong>
                    <span class="badge">${formatCurrency(bill.total || 0)}</span>
                  </div>
                  <small style="color:var(--text-secondary);">
                    ${new Date(bill.date).toLocaleDateString('en-IN')} | 
                    ${bill.items?.length || 0} items
                    ${bill.customer?.name ? ' | ' + bill.customer.name : ''}
                  </small>
                  <button class="btn btn-outline btn-small" style="margin-top:8px;width:100%;" 
                    onclick="window.posReprintBill(${bill.id})">
                    🖨️ Reprint
                  </button>
                </div>
              `).join('')
            }
          </div>
        </div>`;
      
      document.getElementById('closeHistory').onclick = () => {
        document.getElementById('drawerContainer').innerHTML = '';
      };
    }

    window.posReprintBill = (billId) => {
      const bill = salesHistory.find(b => b.id === billId);
      if (bill) {
        cart = JSON.parse(JSON.stringify(bill.items));
        currentCustomer = bill.customer || {};
        renderCart();
        setTimeout(() => printBill(bill.format || 'thermal'), 100);
      }
    };

    // ============ PRODUCTS LIST ============
    function showProducts() {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer">
          <div class="drawer-handle"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3>📦 Products (${products.length})</h3>
            <button class="icon-btn" id="closeProducts">✕</button>
          </div>
          <div class="search-box" style="margin-bottom:12px;">
            <span class="search-icon">🔍</span>
            <input id="productSearch" placeholder="Search products...">
          </div>
          <div id="productList" style="max-height:400px;overflow-y:auto;">
            ${products.map(p => `
              <div class="product-card" onclick="window.posEditProduct(${p.id})">
                <div style="display:flex;align-items:center;gap:12px;">
                  ${p.image ? 
                    `<img src="${p.image}" class="product-image" alt="${p.name}">` : 
                    `<div class="product-image" style="background:var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">📦</div>`
                  }
                  <div style="flex:1;">
                    <strong>${p.name}</strong>
                    <div style="display:flex;gap:6px;margin-top:4px;">
                      <span class="category-tag">${p.category}</span>
                      <span class="badge">${formatCurrency(p.price)}</span>
                    </div>
                    <small style="color:var(--text-secondary);">
                      Barcode: ${p.barcode} | Stock: ${p.stock || 0}
                    </small>
                  </div>
                  <button class="btn btn-accent btn-small" onclick="event.stopPropagation();window.posAddToCartFromList(${p.id})">
                    ➕ Add
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>`;
      
      document.getElementById('closeProducts').onclick = () => {
        document.getElementById('drawerContainer').innerHTML = '';
      };
      
      document.getElementById('productSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = products.filter(p => 
          p.name.toLowerCase().includes(query) || 
          p.barcode.includes(query) ||
          p.category.toLowerCase().includes(query)
        );
        document.getElementById('productList').innerHTML = filtered.map(p => `
          <div class="product-card" onclick="window.posEditProduct(${p.id})">
            <div style="display:flex;align-items:center;gap:12px;">
              ${p.image ? 
                `<img src="${p.image}" class="product-image" alt="${p.name}">` : 
                `<div class="product-image" style="background:var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">📦</div>`
              }
              <div style="flex:1;">
                <strong>${p.name}</strong>
                <div style="display:flex;gap:6px;margin-top:4px;">
                  <span class="category-tag">${p.category}</span>
                  <span class="badge">${formatCurrency(p.price)}</span>
                </div>
                <small style="color:var(--text-secondary);">
                  Barcode: ${p.barcode} | Stock: ${p.stock || 0}
                </small>
              </div>
              <button class="btn btn-accent btn-small" onclick="event.stopPropagation();window.posAddToCartFromList(${p.id})">
                ➕ Add
              </button>
            </div>
          </div>
        `).join('');
      });
    }

    window.posEditProduct = (productId) => {
      const product = getProductById(productId);
      if (product) {
        document.getElementById('drawerContainer').innerHTML = '';
        openAddProductForm(product);
      }
    };

    window.posAddToCartFromList = (productId) => {
      const product = getProductById(productId);
      if (product) {
        addToCart(product);
        showToast(`${product.name} added to cart`, 'success');
      }
    };

    // ============ SETTINGS ============
    function openSettings() {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer">
          <div class="drawer-handle"></div>
          <h3>⚙️ Shop Settings</h3>
          <label>Shop Name</label>
          <input id="setShop" value="${settings.shopName}">
          <label>Owner</label>
          <input id="setOwner" value="${settings.owner}">
          <label>Mobile</label>
          <input id="setMobile" value="${settings.mobile}">
          <label>Address</label>
          <textarea id="setAddr">${settings.address}</textarea>
          <label>GST</label>
          <input id="setGst" value="${settings.gst}">
          <label>UPI ID (for QR payment)</label>
          <input id="setUpi" value="${settings.upi}">
          <small style="color:var(--text-secondary);">Example: shopname@upi</small>
          <label>Footer</label>
          <input id="setFooter" value="${settings.footer}">
          <label>Default Format</label>
          <select id="setFormat">
            <option value="thermal" ${settings.defaultFormat==='thermal'?'selected':''}>Thermal (58mm)</option>
            <option value="a5" ${settings.defaultFormat==='a5'?'selected':''}>A5</option>
            <option value="a4" ${settings.defaultFormat==='a4'?'selected':''}>A4</option>
          </select>
          <div style="display:flex;gap:8px;margin-top:20px;">
            <button class="btn btn-outline" id="closeSettings" style="flex:1;">Cancel</button>
            <button class="btn btn-accent" id="saveSettings" style="flex:1;">Save</button>
          </div>
        </div>`;
      
      document.getElementById('closeSettings').onclick = () => {
        document.getElementById('drawerContainer').innerHTML = '';
      };
      
      document.getElementById('saveSettings').onclick = () => {
        settings.shopName = document.getElementById('setShop').value;
        settings.owner = document.getElementById('setOwner').value;
        settings.mobile = document.getElementById('setMobile').value;
        settings.address = document.getElementById('setAddr').value;
        settings.gst = document.getElementById('setGst').value;
        settings.upi = document.getElementById('setUpi').value;
        settings.footer = document.getElementById('setFooter').value;
        settings.defaultFormat = document.getElementById('setFormat').value;
        saveSettings();
        document.getElementById('drawerContainer').innerHTML = '';
        showToast('Settings saved!', 'success');
      };
    }

    // ============ BACKUP ============
    function backupData() {
      const data = { products, settings, salesHistory, billCounter, exportDate: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `grocery-pos-backup-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Backup downloaded!', 'success');
    }

    function restoreData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.products) {
              if (confirm('Restore backup? Current data will be replaced.')) {
                products = data.products;
                settings = data.settings;
                salesHistory = data.salesHistory || [];
                billCounter = data.billCounter || 1000;
                saveProducts(); saveSettings(); saveHistory();
                updateDashboard();
                showToast('Data restored!', 'success');
              }
            }
          } catch (err) { showToast('Invalid file', 'error'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function showBackupOptions() {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer">
          <div class="drawer-handle"></div>
          <h3>💾 Backup & Restore</h3>
          <button class="btn btn-accent" id="exportBackup" style="width:100%;margin:8px 0;">📥 Download Backup</button>
          <button class="btn btn-outline" id="importBackup" style="width:100%;margin:8px 0;">📤 Restore Backup</button>
          <button class="btn btn-outline" id="closeBackup" style="width:100%;">Cancel</button>
        </div>`;
      
      document.getElementById('exportBackup').onclick = () => { backupData(); document.getElementById('drawerContainer').innerHTML = ''; };
      document.getElementById('importBackup').onclick = () => { restoreData(); document.getElementById('drawerContainer').innerHTML = ''; };
      document.getElementById('closeBackup').onclick = () => { document.getElementById('drawerContainer').innerHTML = ''; };
    }

    // ============ DASHBOARD ============
    function updateDashboard() {
      const today = new Date().toLocaleDateString('en-IN');
      let todayTotal = 0;
      salesHistory.forEach(bill => {
        if (new Date(bill.date).toLocaleDateString('en-IN') === today) {
          todayTotal += (bill.total || 0);
        }
      });
      document.getElementById('todaySales').innerText = formatCurrency(todayTotal);
      document.getElementById('totalBills').innerText = salesHistory.length;
    }

    // ============ EVENT BINDINGS ============
    document.getElementById('scanBarcodeBtn').addEventListener('click', startScanner);
    document.getElementById('manualAddBtn').addEventListener('click', () => showManualEntry());
    document.getElementById('printBillBtn').addEventListener('click', () => {
      if (!cart.length) { showToast('Cart is empty!', 'error'); return; }
      printBill(settings.defaultFormat);
    });
    
    document.getElementById('downloadPdfBtn').addEventListener('click', downloadPDF);
    document.getElementById('downloadJpgBtn').addEventListener('click', downloadJPG);
    document.getElementById('shareBillBtn').addEventListener('click', shareBill);
    
    document.getElementById('darkToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    });
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('historyBtn').addEventListener('click', showHistory);
    document.getElementById('productsBtn').addEventListener('click', showProducts);
    document.getElementById('addProductBtn').addEventListener('click', () => openAddProductForm());
    document.getElementById('backupBtn').addEventListener('click', showBackupOptions);
    
    document.getElementById('customerBtn').addEventListener('click', () => {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer">
          <div class="drawer-handle"></div>
          <h3>👤 Customer</h3>
          <label>Name</label><input id="custName" value="${currentCustomer.name}">
          <label>Mobile</label><input id="custMobile" value="${currentCustomer.mobile}">
          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="btn btn-outline" id="clearCustomer" style="flex:1;">Clear</button>
            <button class="btn btn-accent" id="saveCustomer" style="flex:1;">Save</button>
          </div>
        </div>`;
      
      document.getElementById('saveCustomer').onclick = () => {
        currentCustomer.name = document.getElementById('custName').value;
        currentCustomer.mobile = document.getElementById('custMobile').value;
        document.getElementById('drawerContainer').innerHTML = '';
        showToast('Customer saved', 'success');
      };
      document.getElementById('clearCustomer').onclick = () => {
        currentCustomer = { name: '', mobile: '' };
        document.getElementById('drawerContainer').innerHTML = '';
      };
    });

    // Initialize
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
    renderCart();
    updateDashboard();
    
    console.log('✅ Grocery POS Ready!');
    console.log('💰 QR codes now include bill amount for direct UPI payment');
  })();
</script>
</body>
</html>
