<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Grocery POS • Billing Web App</title>
  <!-- PWA capable -->
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkdyb2NlcnkgUE9TIiwKICAic2hvcnRfbmFtZSI6ICJQb3MiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMwZjE3MmEiCn0=">
  <!-- Libraries -->
  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --primary: #0f172a;
      --primary-foreground: #ffffff;
      --accent: #16a34a;
      --danger: #dc2626;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
      --radius: 16px;
    }
    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --primary: #f1f5f9;
      --primary-foreground: #0f172a;
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
    }
    body {
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
    }
    .app-container {
      max-width: 520px;
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h2 {
      font-weight: 600;
      font-size: 1.5rem;
    }
    .icon-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.2s;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .cart-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-control button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: bold;
      cursor: pointer;
    }
    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
      width: 100%;
      margin-top: 4px;
    }
    .summary {
      background: var(--bg);
      border-radius: 14px;
      padding: 12px;
      font-weight: 500;
    }
    .hidden {
      display: none !important;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--surface);
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .scanner-view {
      width: 100%;
      height: 220px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      box-shadow: 0 -10px 20px rgba(0,0,0,0.2);
      z-index: 999;
      max-height: 70vh;
      overflow-y: auto;
    }
    @media print {
      body { background: white; }
      .app-container, .modal, .drawer, .no-print { display: none; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body class="light">
<div class="app-container" id="appContainer">
  <div class="header">
    <h2>🛒 Grocery POS</h2>
    <div style="display: flex; gap: 8px;">
      <button class="icon-btn" id="darkToggle">🌓</button>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
    </div>
  </div>

  <!-- Dashboard quick stats -->
  <div class="grid-2" id="dashboardStats">
    <div style="background: var(--bg); padding: 12px; border-radius: 14px;"><small>Today Sales</small><br><strong id="todaySales">₹0</strong></div>
    <div style="background: var(--bg); padding: 12px; border-radius: 14px;"><small>Bills</small><br><strong id="totalBills">0</strong></div>
  </div>

  <!-- Cart display -->
  <div id="cartItems" style="max-height: 280px; overflow-y: auto; padding-right: 4px;"></div>
  <div class="summary">
    <div style="display: flex; justify-content: space-between;"><span>Subtotal</span><span id="subtotal">₹0</span></div>
    <div style="display: flex; justify-content: space-between;"><span>Tax</span><span id="taxAmount">₹0</span></div>
    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;"><span>Total</span><span id="finalTotal">₹0</span></div>
  </div>

  <div class="grid-2">
    <button class="btn" id="scanBarcodeBtn">📷 Scan</button>
    <button class="btn btn-outline" id="manualAddBtn">➕ Manual</button>
    <button class="btn btn-outline" id="customerBtn">👤 Customer</button>
    <button class="btn" id="printBillBtn">🖨️ Print</button>
  </div>
  <div style="display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="btn btn-outline" id="historyBtn">📋 History</button>
    <button class="btn btn-outline" id="productsBtn">📦 Products</button>
  </div>
</div>

<!-- Modals & drawers injected dynamically -->
<div id="modalContainer"></div>
<div id="drawerContainer"></div>

<!-- Hidden print area -->
<div id="printArea" class="print-only"></div>

<script>
  (function() {
    // ---------- STORAGE & STATE ----------
    const LS = {
      get(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } },
      set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    };
    
    let products = LS.get('grocery_products', [
      { barcode: '8901234567890', name: 'Basmati Rice', category: 'Grains', price: 180, tax: 5, unit: 'kg' },
      { barcode: '8909876543210', name: 'Sugar', category: 'Groceries', price: 45, tax: 5, unit: 'kg' },
      { barcode: '8901111222333', name: 'Milk 500ml', category: 'Dairy', price: 28, tax: 0, unit: 'packet' }
    ]);
    
    let settings = LS.get('shop_settings', {
      shopName: 'FreshMart Grocery', owner: 'Ramesh Patel', mobile: '9876543210',
      address: '12, Main Road, Mumbai', gst: '27ABCDE1234F1Z5', upi: 'shopowner@upi',
      logo: '', footer: 'Thank you!', currency: '₹', defaultFormat: 'a5'
    });
    
    let cart = [];
    let salesHistory = LS.get('sales_history', []);
    let billCounter = LS.get('bill_counter', 1000);
    let currentCustomer = { name: '', mobile: '' };

    function saveProducts() { LS.set('grocery_products', products); }
    function saveHistory() { LS.set('sales_history', salesHistory); LS.set('bill_counter', billCounter); }
    function saveSettings() { LS.set('shop_settings', settings); }

    // ---------- UTILS ----------
    function formatCurrency(val) { return `${settings.currency}${parseFloat(val).toFixed(2)}`; }
    function getProductByBarcode(code) { return products.find(p => p.barcode === code); }

    function calculateCart() {
      let subtotal = 0, totalTax = 0;
      cart.forEach(item => {
        let rate = item.price || 0;
        let qty = item.quantity || 1;
        let discount = item.discount || 0;
        let lineTotal = (rate * qty) - discount;
        let taxAmt = (lineTotal * (item.tax || 0)) / 100;
        subtotal += lineTotal;
        totalTax += taxAmt;
      });
      return { subtotal, totalTax, final: subtotal + totalTax };
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const { subtotal, totalTax, final } = calculateCart();
      document.getElementById('subtotal').innerText = formatCurrency(subtotal);
      document.getElementById('taxAmount').innerText = formatCurrency(totalTax);
      document.getElementById('finalTotal').innerText = formatCurrency(final);
      
      if (!cart.length) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align:center;">Cart empty</p>';
        return;
      }
      container.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div style="flex:1;"><strong>${item.name}</strong><br><small>${formatCurrency(item.price)} | Tax ${item.tax}%</small></div>
          <div class="qty-control">
            <button onclick="updateQty(${idx}, -1)">−</button>
            <span>${item.quantity}</span>
            <button onclick="updateQty(${idx}, 1)">+</button>
          </div>
          <button class="icon-btn" onclick="removeItem(${idx})">🗑️</button>
        </div>
      `).join('');
    }

    window.updateQty = (idx, delta) => {
      cart[idx].quantity = Math.max(1, (cart[idx].quantity || 1) + delta);
      renderCart();
    };
    window.removeItem = (idx) => { cart.splice(idx,1); renderCart(); };

    function addToCart(product, qty=1) {
      const existing = cart.find(p => p.barcode === product.barcode);
      if (existing) { existing.quantity += qty; }
      else { cart.push({...product, quantity: qty, discount: 0}); }
      renderCart();
      speak(product.name + ' added');
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(text); u.lang = 'en-IN'; window.speechSynthesis.speak(u);
      }
    }

    // ---------- BARCODE SCANNER ----------
    function startScanner() {
      const modal = document.getElementById('modalContainer');
      modal.innerHTML = `
        <div class="modal" id="scannerModal"><div class="modal-content">
          <h3>Scan Barcode</h3>
          <div id="scannerContainer" class="scanner-view"></div>
          <button class="btn" style="margin-top:12px;" id="stopScanner">Close Scanner</button>
        </div></div>`;
      document.getElementById('scannerModal').style.display = 'flex';
      
      Quagga.init({
        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scannerContainer'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader"] }
      }, function(err) {
        if (err) { alert("Camera error: " + err); return; }
        Quagga.start();
      });
      
      Quagga.onDetected((result) => {
        if (result && result.codeResult) {
          const code = result.codeResult.code;
          Quagga.stop();
          document.getElementById('scannerModal').style.display = 'none';
          handleScannedCode(code);
        }
      });
      
      document.getElementById('stopScanner').onclick = () => {
        Quagga.stop();
        document.getElementById('scannerModal').style.display = 'none';
      };
    }

    function handleScannedCode(code) {
      const product = getProductByBarcode(code);
      if (product) { addToCart(product); }
      else { showManualEntry(code); }
    }

    function showManualEntry(prefillBarcode = '') {
      const modal = document.getElementById('modalContainer');
      modal.innerHTML = `
        <div class="modal" id="manualModal"><div class="modal-content">
          <h3>Add Product</h3>
          <input id="manBarcode" placeholder="Barcode" value="${prefillBarcode}">
          <input id="manName" placeholder="Product name">
          <input id="manPrice" type="number" placeholder="Price" step="0.01">
          <input id="manTax" type="number" placeholder="Tax %" value="5">
          <button class="btn" id="addManualToCart">Add to Cart</button>
          <button class="btn btn-outline" id="closeManual">Cancel</button>
        </div></div>`;
      document.getElementById('manualModal').style.display = 'flex';
      document.getElementById('addManualToCart').onclick = () => {
        const prod = {
          barcode: document.getElementById('manBarcode').value || Date.now().toString(),
          name: document.getElementById('manName').value || 'Unknown',
          price: parseFloat(document.getElementById('manPrice').value) || 0,
          tax: parseFloat(document.getElementById('manTax').value) || 0,
          unit: 'piece'
        };
        addToCart(prod);
        document.getElementById('manualModal').style.display = 'none';
      };
      document.getElementById('closeManual').onclick = () => document.getElementById('manualModal').style.display = 'none';
    }

    // ---------- PRINT & FORMATS ----------
    function generateBillHTML(format) {
      const { subtotal, totalTax, final } = calculateCart();
      const billNo = billCounter + 1;
      const date = new Date().toLocaleDateString('en-IN');
      const shop = settings;
      const qrDivId = 'qrCodePrint';
      
      let itemsHtml = cart.map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>${formatCurrency(i.price)}</td><td>${formatCurrency((i.price*i.quantity)- (i.discount||0))}</td></tr>`).join('');
      
      if (format === 'thermal') {
        return `<div style="width:58mm; font-size:12px; font-family:monospace; padding:4mm;">
          <center><strong>${shop.shopName}</strong><br>${shop.address}<br>${shop.mobile}</center>
          <hr>Date:${date} Bill:${billNo}<hr>
          <table width="100%">${itemsHtml}</table>
          <hr><strong>Total: ${formatCurrency(final)}</strong><br>
          <center><div id="${qrDivId}"></div><small>UPI:${shop.upi}</small></center>
          <p>${shop.footer}</p></div>`;
      }
      return `<div style="padding:20px; font-family:sans-serif;">
        <h2>${shop.shopName}</h2><p>${shop.address} | GST:${shop.gst}</p>
        <table border="1" width="100%">${itemsHtml}</table>
        <p>Subtotal: ${formatCurrency(subtotal)} | Tax: ${formatCurrency(totalTax)} | <strong>Total: ${formatCurrency(final)}</strong></p>
        <div id="${qrDivId}"></div><p>${shop.footer}</p></div>`;
    }

    async function printBill(format = settings.defaultFormat || 'a5') {
      billCounter++; 
      const bill = { id: billCounter, date: new Date().toISOString(), items: [...cart], total: calculateCart().final, customer: {...currentCustomer} };
      salesHistory.unshift(bill);
      saveHistory();
      
      const printArea = document.getElementById('printArea');
      printArea.innerHTML = generateBillHTML(format);
      printArea.style.display = 'block';
      
      // generate QR after DOM visible
      setTimeout(() => {
        const qrContainer = document.getElementById('qrCodePrint');
        if (qrContainer) {
          new QRCode(qrContainer, { text: `upi://pay?pa=${settings.upi}&pn=${settings.shopName}`, width: 80, height: 80 });
        }
        window.print();
        printArea.style.display = 'none';
        cart = []; renderCart(); updateDashboard();
      }, 200);
    }

    function updateDashboard() {
      const today = new Date().toLocaleDateString('en-IN');
      let todayTotal = 0;
      salesHistory.forEach(b => { if(new Date(b.date).toLocaleDateString('en-IN')===today) todayTotal+=b.total; });
      document.getElementById('todaySales').innerText = formatCurrency(todayTotal);
      document.getElementById('totalBills').innerText = salesHistory.length;
    }

    // ---------- SETTINGS & UI ----------
    function openSettings() {
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `
        <div class="drawer" id="settingsDrawer">
          <h3>Settings</h3>
          <input id="setShop" placeholder="Shop Name" value="${settings.shopName}">
          <input id="setOwner" placeholder="Owner" value="${settings.owner}">
          <input id="setMobile" placeholder="Mobile" value="${settings.mobile}">
          <input id="setAddr" placeholder="Address" value="${settings.address}">
          <input id="setGst" placeholder="GST" value="${settings.gst}">
          <input id="setUpi" placeholder="UPI ID" value="${settings.upi}">
          <button class="btn" id="saveSettings">Save</button>
        </div>`;
      document.getElementById('saveSettings').onclick = () => {
        settings.shopName = document.getElementById('setShop').value;
        settings.owner = document.getElementById('setOwner').value;
        settings.mobile = document.getElementById('setMobile').value;
        settings.address = document.getElementById('setAddr').value;
        settings.gst = document.getElementById('setGst').value;
        settings.upi = document.getElementById('setUpi').value;
        saveSettings();
        document.getElementById('settingsDrawer').remove();
        alert('Settings saved');
      };
    }

    // ---------- EVENT BINDINGS ----------
    document.getElementById('scanBarcodeBtn').addEventListener('click', startScanner);
    document.getElementById('manualAddBtn').addEventListener('click', () => showManualEntry());
    document.getElementById('printBillBtn').addEventListener('click', () => {
      if(!cart.length) return alert('Cart empty');
      const format = prompt('Format: a4, a5, thermal', settings.defaultFormat);
      printBill(format || 'a5');
    });
    document.getElementById('darkToggle').addEventListener('click', ()=> document.body.classList.toggle('dark'));
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('historyBtn').addEventListener('click', ()=>{
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `<div class="drawer"><h3>Sales History</h3>${salesHistory.slice(0,20).map(b=>`<p>#${b.id} - ${new Date(b.date).toLocaleDateString()} - ${formatCurrency(b.total)}</p>`).join('')}</div>`;
    });
    document.getElementById('productsBtn').addEventListener('click', ()=>{
      const drawer = document.getElementById('drawerContainer');
      drawer.innerHTML = `<div class="drawer"><h3>Products</h3>${products.map(p=>`<p>${p.name} - ${p.barcode} - ${formatCurrency(p.price)}</p>`).join('')}</div>`;
    });
    document.getElementById('customerBtn').addEventListener('click', ()=>{
      const name = prompt('Customer name', currentCustomer.name);
      if(name!==null) currentCustomer.name = name;
    });

    // initial render
    renderCart();
    updateDashboard();
  })();
</script>
</body>
</html>
